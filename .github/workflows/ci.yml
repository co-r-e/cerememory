name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: cargo fmt --all --check --verbose

      - name: Clippy
        run: cargo clippy --workspace --tests --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Check benchmarks compile
        run: cargo bench --workspace --no-run --locked

  python-sdk:
    name: Python SDK tests
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install and test Python SDK
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e './bindings/python[dev]'
          cd bindings/python
          python -m ruff check .
          python -m mypy src
          python -m pytest -v

  typescript-sdk:
    name: TypeScript SDK tests
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json

      - name: Install and test TypeScript SDK
        run: |
          cd bindings/typescript
          npm ci
          npm run typecheck
          npm test

  native-bindings:
    name: Native bindings build
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Python native binding
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin
          cd bindings/python-native && maturin build --release

      - name: Build TypeScript native binding
        run: cd bindings/typescript-native && npm install && npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cerememory:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

  e2e:
    name: E2E tests
    needs: [python-sdk, typescript-sdk, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cerememory:ci
          cache-from: type=gha
          load: true

      - name: Start Cerememory server
        run: |
          docker run -d --name cerememory-e2e -p 8420:8420 cerememory:ci
          # Wait for health endpoint to become reachable from the runner.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8420/health >/dev/null; then
              echo "Server is healthy"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Cerememory server did not become healthy in time" >&2
          docker logs cerememory-e2e || true
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Run Python E2E tests
        run: |
          python -m pip install --upgrade pip
          pip install -e 'bindings/python[dev]'
          cd bindings/python && CEREMEMORY_E2E=1 CEREMEMORY_URL=http://127.0.0.1:8420 pytest tests/test_e2e.py -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json

      - name: Run TypeScript E2E tests
        run: |
          cd bindings/typescript && npm ci
          CEREMEMORY_E2E=1 CEREMEMORY_URL=http://127.0.0.1:8420 npx vitest run tests/e2e.test.ts

      - name: Stop server
        if: always()
        run: |
          docker logs cerememory-e2e || true
          docker stop cerememory-e2e || true
          docker rm cerememory-e2e || true

  llm-e2e:
    name: LLM E2E tests
    needs: check
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[llm-e2e]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run LLM E2E tests
        env:
          CEREMEMORY_LLM_E2E: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: cargo test --test llm_e2e -- --ignored --nocapture
