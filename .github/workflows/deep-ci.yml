name: Deep CI

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Monday at 01:30 UTC, after the security audit window.
    - cron: "30 1 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-deep-cargo-rust-1.95.0-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-deep-cargo-rust-1.95.0-
            ${{ runner.os }}-deep-cargo-
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Install cargo release tools
        run: |
          cargo install cargo-audit --version 0.22.1 --locked
          cargo install cargo-deny --version 0.19.0 --locked
          cargo install cargo-outdated --version 0.17.0 --locked

      - name: Run release check
        run: scripts/release-check.sh
