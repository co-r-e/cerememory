name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual publish)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workflow runs from main
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "This workflow must be run from the main branch."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json

      - name: Install dependencies
        working-directory: bindings/typescript
        run: npm ci

      - name: Run tests
        working-directory: bindings/typescript
        run: |
          npm run typecheck
          npm test

      - name: Build
        working-directory: bindings/typescript
        run: npm run build

      - name: Publish (dry run)
        if: inputs.dry_run == 'true'
        working-directory: bindings/typescript
        run: npm publish --access public --dry-run

      - name: Publish
        if: inputs.dry_run == 'false'
        working-directory: bindings/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
