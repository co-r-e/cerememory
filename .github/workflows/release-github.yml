name: GitHub Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package versions
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          cargo_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          python_version=$(sed -n 's/^version = "\(.*\)"/\1/p' bindings/python/pyproject.toml | head -n 1)
          npm_version=$(sed -n 's/  "version": "\(.*\)",/\1/p' bindings/typescript/package.json | head -n 1)

          [ -n "${version}" ] || { echo "Could not determine version from tag"; exit 1; }
          [ "${version}" = "${cargo_version}" ] || { echo "Cargo version ${cargo_version} does not match tag ${version}"; exit 1; }
          [ "${version}" = "${python_version}" ] || { echo "Python version ${python_version} does not match tag ${version}"; exit 1; }
          [ "${version}" = "${npm_version}" ] || { echo "npm version ${npm_version} does not match tag ${version}"; exit 1; }
          grep -q "^## \[${version}\]" CHANGELOG.md || {
            echo "CHANGELOG.md is missing an entry for ${version}"
            exit 1
          }

  build:
    name: Build (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: cerememory
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: cerememory
          - target: x86_64-apple-darwin
            os: macos-13
            binary: cerememory
          - target: aarch64-apple-darwin
            os: macos-14
            binary: cerememory

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --locked --release --bin cerememory --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp LICENSE README.md dist/
          cd dist
          tar czf cerememory-${{ matrix.target }}.tar.gz ${{ matrix.binary }} LICENSE README.md
          shasum -a 256 cerememory-${{ matrix.target }}.tar.gz > cerememory-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cerememory-${{ matrix.target }}
          path: |
            dist/cerememory-${{ matrix.target }}.tar.gz
            dist/cerememory-${{ matrix.target }}.tar.gz.sha256

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Normalize image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { in_section=1; next }
            in_section && $0 ~ "^## \\[" { exit }
            in_section { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release ${version}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
          generate_release_notes: false
