# cargo-deny configuration for Cerememory.
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
ignore = [
    # Transitive deps with no safe upgrade available:
    { id = "RUSTSEC-2025-0012", reason = "backoff is transitive dep of adapters; considering migration to backon" },
    { id = "RUSTSEC-2025-0141", reason = "bincode is transitive dep of hnsw_rs; no alternative available" },
    { id = "RUSTSEC-2024-0384", reason = "instant is transitive dep of backoff; will be resolved when backoff is replaced" },
    { id = "RUSTSEC-2025-0020", reason = "pyo3 0.22 is pinned by maturin; upgrade requires maturin update" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
